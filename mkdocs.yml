      - Tại sao concept-first: 00-triet-ly/02-tai-sao-concept-first.md
      - Tại sao multi-vault: 00-triet-ly/03-tai-sao-multi-vault.md
      - 3 lớp Raw/Wiki/Schema: 00-triet-ly/04-ba-lop-raw-wiki-schema.md
  - ⚙️ 01. Cài đặt:
      - Cài Obsidian: 01-cai-dat/01-cai-obsidian.md
      - Cài iCloud sync: 01-cai-dat/02-cai-icloud-sync.md
      - Cài Claude Code: 01-cai-dat/03-cai-claude-code.md
      - Cài MCP servers: 01-cai-dat/04-cai-mcp-servers.md
