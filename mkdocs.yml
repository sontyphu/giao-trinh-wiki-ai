site_name: Giáo trình Wiki AI
site_description: Xây hệ thống wiki AI-first với Obsidian + Claude — 7 phần, từ triết lý đến template copy-paste.
site_author: AI Agent Business Kit
site_url: https://sontyphu.github.io/giao-trinh-wiki-ai/
repo_url: https://github.com/sontyphu/giao-trinh-wiki-ai
repo_name: sontyphu/giao-trinh-wiki-ai
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  language: vi
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Chuyển sang tối
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Chuyển sang sáng
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

